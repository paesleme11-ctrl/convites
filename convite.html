<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Digital</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

/* ── TELA DE ENTRADA (quando não há envelope) ─────────── */
#entryStage {
  display: none;
  position: fixed; inset: 0;
  background: #000;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 2rem;
  cursor: pointer;
}
#entryStage.show { display: flex; }

.entry-title {
  font-family: Georgia, serif;
  color: #e8d5a3;
  font-size: clamp(1.4rem, 4vw, 2.5rem);
  font-weight: 300;
  text-align: center;
  padding: 0 2rem;
  letter-spacing: .04em;
}

.entry-btn {
  display: flex; align-items: center; justify-content: center;
  width: 80px; height: 80px;
  border: 2px solid rgba(201,168,76,.6);
  border-radius: 50%;
  background: rgba(201,168,76,.08);
  transition: all .25s;
}
.entry-btn svg { width: 32px; height: 32px; fill: #c9a84c; margin-left: 4px; }
#entryStage:hover .entry-btn {
  background: rgba(201,168,76,.2);
  border-color: #c9a84c;
}
.entry-hint {
  font-family: sans-serif;
  font-size: .75rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: rgba(201,168,76,.55);
}

/* ── ENVELOPE ─────────────────────────────────────────── */
#envStage {
  display: none;
  position: fixed; inset: 0;
  background: #000;
  align-items: center; justify-content: center;
  cursor: pointer;
}
#envStage.show { display: flex; }
#envStage img {
  width: 100%; height: 100%;
  object-fit: contain; display: block;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
}

/* ── CONVITE ──────────────────────────────────────────── */
#invStage {
  display: none;
  position: fixed; inset: 0;
  background: #000;
}
#invStage.show { display: block; }

#artWrap {
  position: relative;
  width: 100%; height: 100%;
}
#artWrap img,
#artWrap video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain; display: block;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
}

/* Invisible hotspots */
.inv-hotspot {
  position: absolute;
  background: transparent;
  border: none;
  cursor: pointer;
  padding: 0;
  z-index: 10;
}
.inv-hotspot a {
  display: block; width: 100%; height: 100%;
  text-decoration: none;
}

/* ── GIFTS POPUP ──────────────────────────────────────── */
#giftsPopup {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.88);
  z-index: 100;
  align-items: center; justify-content: center;
  padding: 1.5rem;
}
#giftsPopup.open { display: flex; }
.popup-inner {
  position: relative;
  max-width: min(90vw, 90vh);
  max-height: 90vh;
}
.popup-inner img {
  width: 100%; height: 100%;
  max-height: 90vh;
  object-fit: contain; display: block;
  border-radius: 8px;
  image-rendering: -webkit-optimize-contrast;
  image-rendering: crisp-edges;
}
.popup-close {
  position: absolute; top: -14px; right: -14px;
  width: 32px; height: 32px;
  background: white; border: none; border-radius: 50%;
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.4);
}

/* ── NOT FOUND ────────────────────────────────────────── */
#notFound {
  display: none;
  position: fixed; inset: 0;
  background: #0d0b07; color: #e8d5a3;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 1rem;
  font-family: Georgia, serif; text-align: center; padding: 2rem;
}
#notFound h2 { font-size: 2rem; font-weight: 300; }
#notFound p  { opacity: .5; font-size: .95rem; font-family: sans-serif; }
</style>
</head>
<body>

<!-- ENTRADA SEM ENVELOPE -->
<div id="entryStage" onclick="handleEntry()">
  <div class="entry-title" id="entryTitle">Você recebeu um convite</div>
  <div class="entry-btn">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </div>
  <span class="entry-hint">Toque para abrir</span>
</div>

<!-- ENVELOPE -->
<div id="envStage" onclick="handleEntry()"></div>

<!-- CONVITE -->
<div id="invStage">
  <div id="artWrap"></div>
</div>

<!-- GIFTS POPUP -->
<div id="giftsPopup">
  <div class="popup-inner">
    <img id="giftsPopupImg" src="" alt="Sugestões de Presentes">
    <button class="popup-close" onclick="closeGifts()">✕</button>
  </div>
</div>

<!-- NOT FOUND -->
<div id="notFound">
  <h2>Convite não encontrado</h2>
  <p id="notFoundMsg">Verifique o link ou entre em contato com quem te convidou.</p>
</div>

<script>
// ── IndexedDB ──────────────────────────────────────────────────────────────
const DB_NAME = 'ConvitesDB', DB_VER = 3;
let db = null;

function openDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('invites')) d.createObjectStore('invites', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('files'))   d.createObjectStore('files');
    };
    r.onsuccess = e => { db = e.target.result; res(); };
    r.onerror   = () => rej(r.error);
  });
}
function dbGet(id) {
  return new Promise((res, rej) => {
    const r = db.transaction('invites','readonly').objectStore('invites').get(id);
    r.onsuccess = () => res(r.result||null);
    r.onerror   = () => rej(r.error);
  });
}
function fileGet(k) {
  return new Promise(res => {
    if (!k) return res(null);
    const r = db.transaction('files','readonly').objectStore('files').get(k);
    r.onsuccess = () => res(r.result||null);
    r.onerror   = () => res(null);
  });
}

// ── Boot ───────────────────────────────────────────────────────────────────
const invId = new URLSearchParams(location.search).get('id');
let inv = null;

openDB().then(async () => {
  if (!invId) { showNotFound('Link inválido.'); return; }
  inv = await dbGet(invId);
  if (!inv)   { showNotFound('Convite não encontrado.'); return; }

  document.title = inv.name || 'Convite Digital';

  // Has envelope?
  if (inv.coverKey) {
    const blob = await fileGet(inv.coverKey);
    if (blob) {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(blob);
      document.getElementById('envStage').appendChild(img);
      document.getElementById('envStage').classList.add('show');
      return; // wait for click — that click IS the user interaction
    }
  }

  // No envelope — show entry screen (also a user interaction gate)
  document.getElementById('entryTitle').textContent = inv.name || 'Você recebeu um convite';
  document.getElementById('entryStage').classList.add('show');

}).catch(e => { console.error(e); showNotFound('Erro ao carregar.'); });

// ── Entry / Envelope click ─────────────────────────────────────────────────
async function handleEntry() {
  // Hide both gates
  document.getElementById('envStage').classList.remove('show');
  document.getElementById('entryStage').classList.remove('show');

  await buildInvite();
  document.getElementById('invStage').classList.add('show');
}

// ── Build invite ───────────────────────────────────────────────────────────
async function buildInvite() {
  const wrap = document.getElementById('artWrap');
  wrap.innerHTML = '';

  // ── Video ────────────────────────────────────────────────────────────────
  if (inv.inviteVidKey) {
    const blob = await fileGet(inv.inviteVidKey);
    if (blob) {
      const v = document.createElement('video');
      v.src        = URL.createObjectURL(blob);
      v.muted      = false;   // we WANT sound
      v.autoplay   = true;
      v.loop       = true;
      v.playsInline = true;
      v.controls   = false;
      wrap.appendChild(v);

      // Play with sound — works because we're inside a user-gesture handler
      try {
        await v.play();
      } catch (e) {
        // Fallback: mute and try again (very old browsers)
        v.muted = true;
        await v.play().catch(()=>{});
      }
    }
  }
  // ── Image ────────────────────────────────────────────────────────────────
  else if (inv.inviteImgKey) {
    const blob = await fileGet(inv.inviteImgKey);
    if (blob) {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(blob);
      img.draggable = false;
      wrap.appendChild(img);
    }
  }

  // ── Invisible link hotspots ───────────────────────────────────────────────
  (inv.btnLinks || []).filter(l => l.url).forEach(l => {
    const btn = document.createElement('div');
    btn.className    = 'inv-hotspot';
    btn.style.left   = l.left + '%';
    btn.style.top    = l.top  + '%';
    btn.style.width  = l.w   + '%';
    btn.style.height = l.h   + '%';
    const a = document.createElement('a');
    a.href   = l.url;
    a.target = '_blank';
    a.rel    = 'noopener';
    if (l.label) a.setAttribute('aria-label', l.label);
    btn.appendChild(a);
    wrap.appendChild(btn);
  });

  // ── Gifts hotspot ─────────────────────────────────────────────────────────
  if (inv.giftsKey) {
    const blob = await fileGet(inv.giftsKey);
    if (blob) {
      document.getElementById('giftsPopupImg').src = URL.createObjectURL(blob);
      const pos = inv.giftsPos || { left:80, top:90, w:15, h:8 };
      const btn = document.createElement('div');
      btn.className    = 'inv-hotspot';
      btn.style.left   = pos.left + '%';
      btn.style.top    = pos.top  + '%';
      btn.style.width  = pos.w   + '%';
      btn.style.height = pos.h   + '%';
      btn.setAttribute('aria-label', 'Ver sugestão de presentes');
      btn.onclick = openGifts;
      wrap.appendChild(btn);
    }
  }
}

// ── Gifts popup ────────────────────────────────────────────────────────────
function openGifts()  { document.getElementById('giftsPopup').classList.add('open'); }
function closeGifts() { document.getElementById('giftsPopup').classList.remove('open'); }
document.getElementById('giftsPopup').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeGifts();
});

// ── Not found ──────────────────────────────────────────────────────────────
function showNotFound(msg) {
  ['envStage','entryStage','invStage'].forEach(id => document.getElementById(id).classList.remove('show'));
  document.getElementById('notFoundMsg').textContent = msg;
  document.getElementById('notFound').style.display = 'flex';
}
</script>
</body>
</html>
